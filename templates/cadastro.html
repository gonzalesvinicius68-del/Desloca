<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Cadastro – Desloca Gestão</title>

<link rel="stylesheet" href="/static/cadastro.css">

</head>

<body>

<div class="card">

  <div class="logo">

    <div class="logo-icon">
      D
    </div>

    <div>
      <h1>Desloca</h1>
      <p>GESTÃO DE PATINETES</p>
    </div>

  </div>

  <div class="titulo">

    <h2>Criar novo acesso ao sistema</h2>

    <span>
      Preencha os dados para criar sua conta
    </span>

  </div>

  <div class="campo">

    <label>Nome completo</label>

    <input
      type="text"
      id="nome"
      placeholder="Seu nome"
    />

  </div>

  <div class="campo">

    <label>Email</label>

    <input
      type="email"
      id="email"
      placeholder="seu@email.com"
    />

  </div>

  <div class="campo">

    <label>Senha</label>

    <input
      type="password"
      id="senha"
      placeholder="••••••••"
    />

  </div>

  <button onclick="cadastrar()">
    Criar conta
  </button>

  <p id="msg"></p>

  <div class="footer">

    <div class="linha"></div>

    <span>ou</span>

    <div class="linha"></div>

  </div>

  <p class="login-link">
    Já possui acesso?
    <a href="/login">
      Entrar no sistema
    </a>
  </p>

</div>

<script>

async function cadastrar(){

  const msg = document.getElementById("msg");

  msg.textContent = "";

  try{

    const resp = await fetch("/api/cadastro",{

      method:"POST",

      headers:{
        "Content-Type":"application/json"
      },

      body:JSON.stringify({

        nome:document.getElementById("nome").value,

        email:document.getElementById("email").value,

        senha:document.getElementById("senha").value
      })
    });

    const d = await resp.json();

    if(resp.ok){

      msg.style.color = "#00e87e";

      msg.textContent = "Conta criada com sucesso";

      setTimeout(()=>{
        window.location.href = "/login";
      },1200);

    }else{

      msg.style.color = "#ff6b6b";

      msg.textContent = d.erro;
    }

  }catch(err){

    msg.style.color = "#ff6b6b";

    msg.textContent = "Erro no servidor";
  }
}

document.addEventListener("keydown", e => {

  if(e.key === "Enter"){
    cadastrar();
  }
});

</script>

</body>
</html>
